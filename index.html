<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#96C800" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sierra Padel" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Sierra Padel</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Captura el evento de instalación antes de que React cargue -->
    <script>
      window.__installPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__installPrompt = e;
        window.dispatchEvent(new Event('installpromptready'));
      });
      window.addEventListener('appinstalled', function() {
        window.__appInstalled = true;
        window.__installPrompt = null;
        window.dispatchEvent(new Event('appinstalled_confirmed'));
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
